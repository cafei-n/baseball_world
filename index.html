<!DOCTYPE html>
<html lang="ja">

    <head>

    <meta charset="UTF-8">

    <title>World Baseball Ranking</title>

    <link rel="stylesheet" href="css/style.css">

    </head>

<body>

    <header class="header">

    <a href="index.html" class="logo">
        世界野球ランキング
    </a>

    <button
        class="menu-button"
        onclick="toggleMenu()">
        ☰
    </button>

</header>

<nav id="menu" class="menu">

    <a href="index.html">
        世界ランキング
    </a>

    <a href="history.html">
        グラフ・アニメーション
    </a>

    <a href="country.html">
        国別戦績
    </a>

    <a href="schedule.html">
        試合日程・結果
    </a>

</nav>

<h1>世界ランキング</h1>

<div>
    <label>
        日付指定：
    </label>

    <input type="date" id="dateSelect"
        onchange="showDateRanking()"
    >

</div>

<div>

    <label>
        比較期間：
    </label>

    <select
        id="comparePeriod"
        onchange="showDateRanking()"
    >
        <option value="month">1か月</option>
        <option value="year">1年</option>
        <option value="4year">4年</option>
    </select>

     <div id="lastUpdate" class="update-date"></div>

</div>

<table>

    <thead>

        <tr>

        <th>順位</th>
        <th>国</th>
        <th>ポイント</th>
        <th>前回とのポイント差</th>
        <th>前回との順位差</th>

        </tr>

    </thead>


    <tbody id="ranking">

    </tbody>


</table>

<script src="js/common.js"></script>
<script src="js/index.js"></script>

</body>

</html>
