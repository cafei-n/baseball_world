<!DOCTYPE html>
<html lang="ja">

    <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>country Ranking</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

    <link rel="stylesheet" href="css/style.css">

    </head>

<body>

    <header class="header">

    <a href="index.html" class="logo">
        世界野球ランキング
    </a>

    <button
        class="menu-button"
        onclick="toggleMenu()">

        ☰

    </button>

</header>

<nav id="menu" class="menu">

    <a href="index.html">
        ランキング
    </a>

    <a href="history.html">
        グラフ・アニメーション
    </a>

    <a href="country.html">
        国別戦績
    </a>

    <a href="schedule.html">
        試合日程・結果
    </a>

</nav>

<h2 id="countryName">

Loading...

</h2>


<div class="control">

    <label>
        表示国
    </label>

    <select
        id="teamSelector"
        size="1"
        onchange="changeCountry()"
    >
    </select>

</div>

<div id="updateDate">

更新日：

</div>

<div class="summary">

<div class="card">
<h3>現在順位</h3>
<p id="currentRank">-</p>
</div>

<div class="card">
<h3>最高順位</h3>
<p id="bestRank">-</p>
</div>

<div class="card">
<h3>最低順位</h3>
<p id="worstRank">-</p>
</div>

<div class="card">
<h3>現在ポイント</h3>
<p id="currentPoint">-</p>
</div>

<div class="card">
<h3>最高ポイント</h3>
<p id="bestPoint">-</p>
</div>

<div class="card">
<h3>最低ポイント</h3>
<p id="worstPoint">-</p>
</div>

</div>

<h2>順位・ポイント推移</h2>

<div class="control">

    <label>
        開始日
    </label>

    <input
        type="date"
        id="startDate"
        onchange="drawHistory()"
    >

    <label>
        終了日
    </label>

    <input
        type="date"
        id="endDate"
        onchange="drawHistory()"
    >

    <label>
        表示
    </label>

    <select id="graphType" 
        onchange="drawHistory()">

        <option value="rank">
            順位
        </option>

        <option value="point">
            ポイント
        </option>

    </select>

</div>

<div class="chart-container">

    <canvas id="chart"></canvas>

</div>

<div class="table-section">

<h2>

直近10試合

</h2>

<table>

<thead>

<tr>

<th>日付</th>
<th>結果</th>
<th>スコア</th>
<th>相手</th>
<th>ポイント変化</th>
<th>大会</th>

</tr>

</thead>

<tbody id="recentGames">

</tbody>

</table>

</div>

<div class="table-section">

<h2>

大会別成績

</h2>

<table>

<thead>

<tr>

<th>大会</th>
<th>試合</th>
<th>勝</th>
<th>敗</th>
<th>分</th>
<th>勝率</th>
<th>ポイント増減</th>

</tr>

</thead>

<tbody id="tournamentStats">

</tbody>

</table>

</div>

<div class="table-section">

<h2>

年代別成績

</h2>

<table>

<thead>

<tr>

<th>年代</th>
<th>試合</th>
<th>勝</th>
<th>敗</th>
<th>分</th>
<th>勝率</th>
<th>ポイント増減</th>

</tr>

</thead>

<tbody id="ageStats">

</tbody>

</table>

</div>

<script>

</script>

<script src="js/common.js"></script>
<script src="js/chart.js"></script>
<script src="js/country.js"></script>

</body>

</html>
