<!DOCTYPE html>
<html lang="ja">

    <head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Ranking History</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

     <link rel="stylesheet" href="css/style.css">

    </head>

<body>

    <header class="header">

    <a href="index.html" class="logo">
        世界野球ランキング
    </a>

    <button
        class="menu-button"
        onclick="toggleMenu()">

        ☰

    </button>

</header>

<nav id="menu" class="menu">

    <a href="index.html">
        ランキング
    </a>

    <a href="history.html">
        グラフ・アニメーション
    </a>

    <a href="country.html">
        国別戦績
    </a>

</nav>

<h1>野球ランキングチャート</h1>

<div class="control">

    <label>
        開始日
    </label>

    <input
        type="date"
        id="startDate"
        onchange="showHistory()"
    >

    <label>
        終了日
    </label>

    <input
        type="date"
        id="endDate"
        onchange="showHistory()"
    >

    <label>
        表示
    </label>

    <select id="graphType" 
        onchange="showHistory()">

        <option value="rank">
            順位
        </option>

        <option value="point">
            ポイント
        </option>

    </select>

</div>

<div class="control">

    <label>
        表示国
    </label>

    <select
        id="teamSelector"
        multiple
        size="5"
        onchange="showHistory()"
    >

    </select>

</div>

<div id="lastUpdate" class="update-date">
</div>

<div class="chart-container">

    <canvas
        id="chart"
    ></canvas>

</div>

<h1>動く世界ランキング</h1>

<div class="control">

    <label>
        動画
    </label>

    <select id="movieType">

    <option value="ranking">
        順位
    </option>

    <option value="point">
        ポイント
    </option>

    </select>

    <label>
        期間
    </label>

    <select id="moviePeriod">

    <option value="month">
        1か月
    </option>

    <option value="year">
        1年
    </option>

    <option value="4year">
        4年
    </option>

    </select>

    <button onclick="updateMovie()">
        表示
    </button>

</div>

<div class="video-container">

    <video
        id="rankingMovie"
        controls
        preload="metadata"
    >

    <source
        src="movie/ranking_year.mp4"
        type="video/mp4"
    >
    </video>

</div>

<script src="js/chart.js"></script>
<script src="js/history.js"></script>

</body>

</html>
